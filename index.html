<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Bar Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-viewport">
        <!-- --- Top Ad Area --- -->
        <div class="top-ad-section">
            <div class="ad-banner-placeholder">Top Ad Banner</div>
        </div>

        <!-- --- Main Middle Area --- -->
        <div class="main-container">
            
            <!-- Left Panel -->
            <div class="side-panel left-panel">
                <div class="menu-back-block"></div>
                <div class="active-boosts-list">
                    <div class="boost-placeholder"></div>
                    <div class="boost-placeholder"></div>
                    <div class="boost-placeholder"></div>
                </div>
                <div class="ad-panel-placeholder" style="margin-top: auto;">Side Ad</div>
            </div>

            <!-- Game Core Central Area -->
            <div class="game-core-section">
                <div class="percentage-display" id="percentage-text">0.00%</div>
                <div class="progress-bar-placeholder">
                    <div class="progress-bar-fill" id="progress-fill-bar"></div>
                </div>
                <button class="increment-button-placeholder" id="click-button"></button>
            </div>

            <!-- Right Panel -->
            <div class="side-panel right-panel">
                <div class="ad-panel-placeholder" style="height: 100%; display: flex; align-items: center; justify-content: center;">
                    Foreign Ad Space
                </div>
            </div>

        </div>

        <!-- --- Bottom Upgrades Area --- -->
        <div class="bottom-interface">
            <h3 class="store-title">Upgrades Shop</h3>
            
            <div class="upgrades-carousel">
                <button class="scroll-btn left-scroll">&#9664;</button>
                
                <div class="horizontal-store" id="upgrades-list">
                    
                    <!-- Level 1 Auto-Loader -->
                    <div class="store-item" id="item-autoloader">
                        <div class="item-info">
                            <div class="item-header">
                                <h4>Auto-Loader</h4>
                                <span id="autoloader-count" class="upgrade-count">0/10</span>
                            </div>
                            <p>Generates +0.01%/sec</p>
                            <!-- New Info text that will show up when capped -->
                            <p id="autoloader-unlock-info" class="unlock-info"></p>
                        </div>
                        <button class="buy-button" id="buy-autoloader">Cost: 0.50%</button>
                    </div>

                    <!-- Multiplier Upgrade (Capped at 3) -->
                    <div class="store-item" id="item-multiplier">
                        <div class="item-info">
                            <div class="item-header">
                                <h4>Multiplier</h4>
                                <span id="multiplier-count" class="upgrade-count">0/3</span>
                            </div>
                            <p>Click power x1.1</p>
                        </div>
                        <button class="buy-button" id="buy-multiplier">Cost: 15.00%</button>
                    </div>

                    <!-- Placeholder Locked Upgrade 3 -->
                    <div class="store-item locked">
                        <div class="item-info">
                            <h4>Overclock</h4>
                            <p>Speed +50%</p>
                        </div>
                        <button class="buy-button disabled">Cost: 50.00%</button>
                    </div>

                    <!-- Placeholder Locked Upgrade 4 -->
                    <div class="store-item locked">
                        <div class="item-info">
                            <h4>Quantum Click</h4>
                            <p>Massive boost</p>
                        </div>
                        <button class="buy-button disabled">Cost: 75.00%</button>
                    </div>
                </div>

                <button class="scroll-btn right-scroll">&#9654;</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

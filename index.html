<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-viewport">
        <!-- TOP AD BANNER -->
        <header class="top-ad-section">
            <div class="ad-banner-placeholder"></div>
        </header>

        <!-- MAIN CONTAINER -->
        <div class="main-container">
            <!-- LEFT PANEL -->
            <aside class="side-panel">
                <div class="menu-back-block"></div> 
                <div class="active-boosts-list">
                    <div class="boost-placeholder"></div>
                    <div class="boost-placeholder"></div>
                    <div class="boost-placeholder"></div>
                </div>
            </aside>

            <!-- CORE GAME -->
            <main class="game-core-section">
                <!-- Added an ID here and set to 0.00% -->
                <div class="percentage-display" id="percentage-text">0.00%</div>
                
                <div class="progress-bar-placeholder">
                    <!-- Added an ID here -->
                    <div class="progress-bar-fill" id="progress-fill-bar"></div>
                </div>
                
                <!-- Added an ID here and removed the 0 -->
                <button class="increment-button-placeholder" id="click-button"></button>
            </main>

            <!-- RIGHT PANEL -->
            <aside class="side-panel right-panel">
                <div class="ad-panel-placeholder"></div>
                <div class="ad-panel-placeholder"></div>
            </aside>
        </div>

        <!-- BOTTOM AREA -->
        <footer class="bottom-interface">
            <div class="upgrades-area">
                <div class="upgrades-label-placeholder"></div> 
                <nav class="upgrade-tabs">
                    <div class="tab-item"><div class="arrow-icon-placeholder left-arrow"></div></div>
                    <div class="tab-item"></div>
                    <div class="tab-item"></div>
                    <div class="tab-item"><div class="arrow-icon-placeholder right-arrow"></div></div>
                </nav>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
